services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: baggagio
      POSTGRES_PASSWORD: baggagio
      POSTGRES_DB: baggagio_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baggagio -d baggagio_db"]
      interval: 3s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 3s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://baggagio:baggagio@db:5432/baggagio_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-placeholder-key}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    
    #Comentar para produção
    volumes:
      - ./backend:/app
    
    command: ["sh", "-c", "alembic upgrade head && python -m scripts.seed_admin && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 120s
      
  outbox-relay:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://baggagio:baggagio@db:5432/baggagio_db
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-placeholder-key}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./backend:/app

    working_dir: /app

    command: ["python", "-m", "app.workers.outbox_relay"]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://baggagio:baggagio@db:5432/baggagio_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-placeholder-key}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      MESSAGING_RETRY_TTL_MS: "5000"
      MESSAGING_MAX_ATTEMPTS: "8"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./backend:/app
    working_dir: /app
    command: ["python", "-m", "app.workers.audit_consumer"]
    restart: unless-stopped

  test:
    profiles: ["test"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://baggagio:baggagio@db:5432/baggagio_test_db
      TEST_DATABASE_URL: postgresql+psycopg://baggagio:baggagio@db:5432/baggagio_test_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-test-key}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
    depends_on:
      db:
        condition: service_healthy

    volumes:
      - ./backend:/app

    working_dir: /app

    command: ["sh", "-c", "python -m pytest -q"]
    


volumes:
  pgdata: