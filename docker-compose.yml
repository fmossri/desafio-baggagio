services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: baggagio
      POSTGRES_PASSWORD: baggagio
      POSTGRES_DB: baggagio_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baggagio -d baggagio_db"]
      interval: 3s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 3s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      APP_NAME: ${APP_NAME:-desafio-fullstack-gestao-de-produtos}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://baggagio:baggagio@db:5432/baggagio_db}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-placeholder-key}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    
    volumes:
      - ./backend:/app
    
    command: ["sh", "-c", "alembic upgrade head && python -m scripts.seed_admin && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5); raise SystemExit(0 if r.status==200 else 1)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 120s
      
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

    depends_on:
      api:
        condition: service_healthy

  outbox-relay:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://baggagio:baggagio@db:5432/baggagio_db}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-placeholder-key}
      MESSAGING_RETRY_TTL_MS: ${MESSAGING_RETRY_TTL_MS:-5000}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-100}
      OUTBOX_POLL_INTERVAL_SECONDS: ${OUTBOX_POLL_INTERVAL_SECONDS:-2}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./backend:/app

    working_dir: /app

    command: ["python", "-m", "app.workers.outbox_relay"]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://baggagio:baggagio@db:5432/baggagio_db}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-placeholder-key}
      MESSAGING_MAX_ATTEMPTS: ${MESSAGING_MAX_ATTEMPTS:-8}
      MESSAGING_RETRY_TTL_MS: ${MESSAGING_RETRY_TTL_MS:-5000}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./backend:/app
    working_dir: /app
    command: ["python", "-m", "app.workers.audit_consumer"]
    restart: unless-stopped

  test:
    profiles: ["test"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      DATABASE_URL: ${TEST_DATABASE_URL:-postgresql+psycopg://baggagio:baggagio@db:5432/baggagio_test_db}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-test-key}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      TEST_DATABASE_URL: ${TEST_DATABASE_URL:-postgresql+psycopg://baggagio:baggagio@db:5432/baggagio_test_db}
    depends_on:
      db:
        condition: service_healthy

    volumes:
      - ./backend:/app

    working_dir: /app

    command: ["sh", "-c", "python -m pytest -q"]
    


volumes:
  pgdata:
  frontend_node_modules: