services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: baggagio
      POSTGRES_PASSWORD: baggagio
      POSTGRES_DB: baggagio_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baggagio -d baggagio_db"]
      interval: 3s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://baggagio:baggagio@db:5432/baggagio_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-placeholder-key}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    
    #Comentar para produção
    volumes:
      - ./backend:/app
    
    command: ["sh", "-c", "alembic upgrade head && python -m scripts.seed_admin && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]

  test:
    profiles: ["test"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      TEST_DATABASE_URL: postgresql+psycopg://baggagio:baggagio@db:5432/baggagio_test_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-test-key}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
    depends_on:
      db:
        condition: service_healthy

    volumes:
      - ./backend:/app

    working_dir: /app

    command: ["sh", "-c", "alembic upgrade head && python -m pytest -q"]
    


volumes:
  pgdata: