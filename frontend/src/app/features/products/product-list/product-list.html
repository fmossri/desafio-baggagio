<p-confirmDialog />

<p-toolbar>
    <ng-template pTemplate="start">
        <div class="product-list__toolbar">
            <div class="product-list__row product-list__row--search">
                <span class="p-float-label product-list__float product-list__float--search">
                    <label class="product-list__label" for="q">Pesquisar</label>
                    <input 
                        pInputText 
                        id="q" 
                        [(ngModel)]="filterQ" 
                        (keyup.enter)="applyFilters()"
                        placeholder=" "
                        autocomplete="off"
                    />
                </span>
                <div class="product-list__grow" aria-hidden="true"></div>
                <p-button
                label="Buscar"
                icon="pi pi-search"
                severity="secondary"
                [outlined]="true"
                (onClick)="applyFilters()"
                />
            </div>
            <div class="product-list__row product-list__row--filters">
                <span class="p-float-label product-list__float">
                    <label class="product-list__label" for="sort">Ordenar por</label>
                    <p-select
                        inputId="sort"
                        [(ngModel)]="sort"
                        [options]="sortOptions"
                        optionLabel="label"
                        optionValue="value"
                        placeholder="Ordenar por"
                        styleClass="min-w-12rem"
                    />
                </span> 
                <span class="p-float-label product-list__float">
                    <label class="product-list__label" for="active">Status</label>
                    <p-select
                        inputId="active"
                        [(ngModel)]="filterActive"
                        [options]="activeFilterOptions"
                        optionLabel="label"
                        optionValue="value"
                        placeholder="Ativo"
                        styleClass="min-w-10rem"
                    />
                </span>
            
                <span class="p-float-label product-list__float">
                    <label class="product-list__label" for="minPrice">Preço mín.</label>
                    <p-inputNumber
                        inputId="minPrice"
                        [(ngModel)]="filterMinPrice"
                        mode="decimal"
                        [minFractionDigits]="2"
                        [maxFractionDigits]="2"
                        [min]="0"
                        placeholder="Preço mín."
                        [showClear]="true"
                        styleClass="min-w-10rem"
                    />
                </span>
                <span class="p-float-label product-list__float">
                    <label class="product-list__label" for="maxPrice">Preço máx.</label>
                    <p-inputNumber
                        inputId="maxPrice"
                        [(ngModel)]="filterMaxPrice"
                        mode="decimal"
                        [minFractionDigits]="2"
                        [maxFractionDigits]="2"
                        [min]="0"
                        placeholder="Preço máx."
                        [showClear]="true"
                        styleClass="min-w-10rem"
                    />
                </span>

                <div class="product-list__filter-actions">
                    <p-button label="Aplicar filtros" (onClick)="applyFilters()" />
                </div>
            </div>
        </div>
    </ng-template>
    <ng-template pTemplate="end">
        <p-button label="Novo produto" icon="pi pi-plus" (onClick)="openCreate()" />
    </ng-template>
</p-toolbar>

@if (error) {
    <p-message severity="error" [text]="error" />
}

<p-table
    [value]="products"
    [lazy]="true"
    (onLazyLoad)="load($event)"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10, 25, 50]"
    [totalRecords]="totalRecords"
    [loading]="loading"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Mostrando de {first} a {last} em {totalRecords} produtos"
>
    <ng-template pTemplate="header">
        <tr>
            <th>Nome</th>
            <th>Preço</th>
            <th>Qtd.</th>
            <th>Ativo</th>
            <th style="width: 8rem"></th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
        <tr>
            <td>{{ row.name }}</td>
            <td>{{ row.price }}</td>
            <td>{{ row.quantity }}</td>
            <td>
                <p-tag [severity]="row.active ? 'success' : 'danger'" [value]="row.active ? 'Sim' : 'Não'" />
            </td>
            <td>
                <p-button icon="pi pi-pencil" [text]="true" (onClick)="openEdit(row)" />
                <p-button icon="pi pi-trash" severity="danger" (onClick)="confirmDelete(row)" />
            </td>
        </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
        <tr>
            <td colspan="5">Nenhum produto encontrado.</td>
        </tr>
    </ng-template>
</p-table>

<app-product-form-dialog
    [visible]="showDialog"
    (visibleChange)="showDialog = $event"
    [product]="dialogProduct"
    (saved)="onDialogSaved()"
/>
